name: CI

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/core/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]

jobs:
  changed-path-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @efs/api lint
      - run: pnpm --filter @efs/web lint
      - run: pnpm --filter @efs/web exec tsc --noEmit
      - run: pnpm --filter @efs/core lint
      - run: pnpm --filter @efs/core test
